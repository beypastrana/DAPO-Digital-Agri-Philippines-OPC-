<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
  <title>Scroll Example</title>

  <!-- ✅ Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Zalando Sans SemiExpanded", sans-serif;
      scroll-behavior: smooth;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
    }

    /* SECTION 1 */
    #section1 {
      background-image: url(background1.jpg);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      color: black;
    }

    /* SECTION 2 */
    #section2 {
      background-color: lightblue;
    }

    /* SECTION 3 */
    #section3 {
      background-color: beige;
    }

    h1 {
      font-weight: 400;
      margin: 0;
    }

    p {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #333;
      margin-top: 15px;
      font-style: italic;
    }

    /* ✅ Scroll Arrow Styling */
    .scroll-down {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      color: black;
      cursor: pointer;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, 10px); }
      60% { transform: translate(-50%, 5px); }
    }

    .scroll-down:hover {
      color: gold;
    }
  </style>
</head>

<body>
  <!-- ✅ SECTION 1 -->
  <section id="section1">
    <h1>Glocal Innovations Incorporation</h1>
    <div class="scroll-down" onclick="scrollToSection('section2')">▼</div>
  </section>

  <!-- ✅ SECTION 2 -->
  <section id="section2">
    <h1>This is the Next Section!</h1>
    <p>Your future begins with innovation and creativity.</p>
    <div class="scroll-down" onclick="scrollToSection('section3')">▼</div>
  </section>

  <!-- ✅ SECTION 3 -->
  <section id="section3">
    <h1>Final Section</h1>
    <p>Thank you for visiting our page!</p>
    <div class="scroll-down" onclick="scrollToSection('section4')">▼</div>
  </section>

  <!-- ✅ SECTION 4 -->
  <section id="section4">
    <h1>Contact Us</h1>
    <p>Thank you for visiting our page!</p>
    <div class="scroll-down" onclick="scrollToSection('section4')">▼</div>
  </section>

  <!-- ✅ JavaScript -->
  <script>
    function scrollToSection(id) {
      document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }
  </script>
</body>
</html>
